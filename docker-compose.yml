name: smartex-grid

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: grid-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     ${TIMESCALE_USER:-smartgrid}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-smartgrid}
      POSTGRES_DB:       smartgrid
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks: [grid-net]
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: grid-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [grid-net]
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: grid-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [grid-net]
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: grid-kafka-ui
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [grid-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grid-grafana
    depends_on: [timescaledb, prometheus]
    ports:
      - "3001:3000"   # 3001 to avoid conflict with SmartTex on 3000
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      TIMESCALE_USER:             ${TIMESCALE_USER:-smartgrid}
      TIMESCALE_PASSWORD:         ${TIMESCALE_PASSWORD:-smartgrid}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks: [grid-net]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: grid-prometheus
    ports:
      - "9091:9090"   # 9091 to avoid conflict with SmartTex on 9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [grid-net]
    restart: unless-stopped

networks:
  grid-net:
    name: smartex-grid-net
    driver: bridge

volumes:
  timescale_data:
  grafana_data:
  prometheus_data:
